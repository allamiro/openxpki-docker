x-base-image: &base-image
  image: whiterabbitsecurity/openxpki3:3.32.16

# Note on the ":z" suffix on host (./...) bind mounts below:
# it tells SELinux-enabled hosts (RHEL/Fedora, typically with podman) to
# relabel the content so the containers can read it. It is a no-op on hosts
# without SELinux (e.g. Docker Desktop), so the file works on docker and podman.

services:
  db:
#    restart: always
    container_name: OpenXPKI_Database
    image: mariadb:11.4
    command: --default-authentication-plugin=mysql_native_password
    user: mysql:mysql
    volumes:
      - openxpkidb:/var/lib/mysql
      - openxpkidbsocket:/var/run/mysqld/
      - ./openxpki-config/contrib/sql/schema-mariadb.sql:/docker-entrypoint-initdb.d/schema-mariadb.sql:z
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      MYSQL_DATABASE: openxpki
      MYSQL_USER: openxpki
      MYSQL_PASSWORD: openxpki
      MYSQL_ROOT_PASSWORD: topsecret

  server:
    << : *base-image
    container_name: OpenXPKI_Server
    command: /usr/bin/openxpkictl start server --nd
    user: openxpki:openxpki
    group_add:
     - openxpkiclient
    tmpfs:
      - /tmp
    volumes:
      - ./openxpki-config:/etc/openxpki:z
      - ./config/client.key:/home/pkiadm/.oxi/client.key:z
      - openxpkilog:/var/log/openxpki
      - openxpkisocket:/run/openxpkid
      - openxpkidbsocket:/var/run/mysqld/
      - openxpkidownload:/var/www/download
    # Set the container timezone here instead of bind-mounting /etc/timezone
    # and /etc/localtime from the host: those paths differ across host OSes
    # (e.g. /etc/timezone does not exist on RHEL/Fedora) and break podman.
    environment:
      TZ: Etc/UTC
    healthcheck:
      test: /usr/bin/openxpkictl status server
      interval: 5s
      timeout: 10s
      retries: 5
      # Give the server time to boot before counting failures; the perl
      # status call is slow on first start (and under qemu emulation).
      start_period: 90s
    depends_on:
      db:
        condition: service_healthy

  client:
    << : *base-image
    container_name: OpenXPKI_Client
    command: /usr/bin/openxpkictl start client --nd
    user: openxpkiclient:openxpkiclient
    group_add:
     - www-data
    tmpfs:
      - /tmp
    volumes:
      - ./openxpki-config/client.d:/etc/openxpki/client.d:z
      - openxpkilogui:/var/log/openxpki-client
      - openxpkisocket:/run/openxpkid
      - openxpkiclientsocket:/run/openxpki-clientd
      - openxpkidbsocket:/var/run/mysqld/
    healthcheck:
      test: /usr/bin/openxpkictl status client
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      server:
        condition: service_healthy

  web: &web-apache
    << : *base-image
    container_name: OpenXPKI_WebUI
    command: /usr/bin/start-webserver apache
    ports:
      - "8080:80/tcp"
      - "8443:443/tcp"
    volumes:
      - ./openxpki-config/contrib/apache2-openxpki-site.conf:/etc/apache2/sites-enabled/openxpki.conf:z
      - ./openxpki-config/tls/:/etc/openxpki/tls/:z
      - openxpkiclientsocket:/run/openxpki-clientd
      - openxpkidownload:/var/www/download:ro
    healthcheck:
      test: wget -q http://localhost/healthcheck/ping
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      client:
        condition: service_healthy

  web-nginx:
    << : *web-apache
    container_name: OpenXPKI_WebUI_nginx
    command: /usr/bin/start-webserver nginx
    # Don't inherit the ports from web-apache, otherwise the two web
    # containers clash on 8080/8443 when both are started.
    ports: []
    volumes:
      - ./openxpki-config/contrib/nginx-openxpki-site:/etc/nginx/sites-enabled/openxpki:z
      - ./openxpki-config/tls/:/etc/openxpki/tls/:z
      - openxpkiclientsocket:/run/openxpki-clientd
      - openxpkidownload:/var/www/download:ro

volumes:
  openxpkidb:
  openxpkisocket:
  openxpkiclientsocket:
  openxpkidbsocket:
  openxpkilog:
  openxpkilogui:
  openxpkidownload:
